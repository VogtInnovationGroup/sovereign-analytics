<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sovereign Analytics Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #070d18; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .container { max-width: 1120px; margin: 0 auto; padding: 2rem; }
    h1 { font-size: 1.5rem; font-weight: 700; color: #fff; }
    h2 { font-size: 0.8rem; font-weight: 600; color: #fff; margin-bottom: 0.75rem; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn { font-size: 0.65rem; padding: 5px 10px; border-radius: 5px; cursor: pointer; border: 1px solid rgba(100,116,139,0.3); background: transparent; color: #94a3b8; transition: all 0.2s; }
    .btn:hover { border-color: rgba(0,212,255,0.3); color: #67e8f9; }
    .btn-p { border-color: rgba(0,212,255,0.5); color: #67e8f9; background: rgba(0,212,255,0.1); }
    .btn-p:hover { background: rgba(0,212,255,0.2); }
    .auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .auth-box { width: 100%; max-width: 360px; padding: 2rem; }
    .auth-box input { width: 100%; padding: 10px 14px; font-size: 0.875rem; border-radius: 6px; border: 1px solid rgba(100,116,139,0.3); background: rgba(15,23,42,0.5); color: #fff; margin-bottom: 12px; outline: none; }
    .auth-box input:focus { border-color: rgba(0,212,255,0.4); }
    .error { color: #f87171; font-size: 0.8rem; margin-bottom: 0.75rem; }
    .badge { display: inline-flex; align-items: center; gap: 6px; font-size: 0.6rem; padding: 3px 10px; border-radius: 100px; margin-top: 4px; }
    .badge-green { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); color: #4ade80; }
    .badge-green::before { content: '\25CF'; font-size: 6px; }
    .badge-live { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); color: #f87171; animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .stats-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 0.5rem; margin-bottom: 1.5rem; }
    @media (max-width: 800px) { .stats-grid { grid-template-columns: repeat(4, 1fr); } }
    @media (max-width: 500px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
    .sc { border: 1px solid rgba(100,116,139,0.12); border-radius: 6px; padding: 10px 8px; text-align: center; background: rgba(8,14,30,0.5); }
    .sv { font-size: 1.1rem; font-weight: 700; color: #22d3ee; font-family: 'SF Mono', monospace; }
    .sl { font-size: 0.55rem; color: #64748b; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.5px; }
    .card { border: 1px solid rgba(100,116,139,0.12); border-radius: 6px; padding: 16px; background: rgba(8,14,30,0.5); }
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.75rem; }
    .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 0.75rem; }
    .g4 { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 0.5rem; margin-bottom: 0.75rem; }
    @media (max-width: 700px) { .g2,.g3,.g4 { grid-template-columns: 1fr; } }
    .row { display: flex; justify-content: space-between; font-size: 0.7rem; padding: 3px 0; }
    .rl { color: #cbd5e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 6px; }
    .rv { color: #22d3ee; font-family: monospace; flex-shrink: 0; }
    .rs { color: #475569; font-size: 0.6rem; margin-left: 4px; }
    .muted { color: #64748b; font-size: 0.7rem; }
    .chart { display: flex; align-items: flex-end; gap: 2px; height: 100px; }
    .cb { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; height: 100%; position: relative; }
    .bar { width: 100%; border-radius: 2px 2px 0 0; background: rgba(0,212,255,0.5); min-height: 2px; transition: background 0.2s; cursor: default; }
    .bar:hover { background: rgba(0,212,255,0.8); }
    .cl { font-size: 5px; color: #475569; margin-top: 2px; }
    .tt { display: none; position: absolute; bottom: 100%; margin-bottom: 4px; background: #1e293b; border: 1px solid rgba(100,116,139,0.3); border-radius: 4px; padding: 3px 6px; font-size: 0.6rem; color: #fff; white-space: nowrap; z-index: 10; }
    .cb:hover .tt { display: block; }
    .bdr { margin-bottom: 6px; }
    .bdh { display: flex; justify-content: space-between; font-size: 0.7rem; margin-bottom: 2px; }
    .bdt { width: 100%; height: 5px; border-radius: 100px; background: #0f172a; }
    .bdf { height: 100%; border-radius: 100px; background: rgba(0,212,255,0.5); }
    .rr { display: flex; align-items: center; gap: 10px; font-size: 0.7rem; padding: 3px 0; }
    .rt { color: #475569; font-family: monospace; width: 45px; flex-shrink: 0; font-size: 0.65rem; }
    .rp { color: #cbd5e1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .rm { color: #475569; font-size: 0.6rem; flex-shrink: 0; }
    .hchart { display: flex; align-items: flex-end; gap: 1px; height: 50px; }
    .hbar { flex: 1; background: rgba(0,212,255,0.3); border-radius: 1px 1px 0 0; min-height: 1px; position: relative; }
    .hbar:hover { background: rgba(0,212,255,0.7); }
    .status { display: flex; align-items: center; gap: 8px; font-size: 0.6rem; color: #475569; margin-top: 1.5rem; padding-top: 0.75rem; border-top: 1px solid rgba(100,116,139,0.08); }
    .dot { width: 5px; height: 5px; border-radius: 50%; background: #22c55e; }
    .loading { min-height: 100vh; display: flex; align-items: center; justify-content: center; color: #475569; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    // ─── Configuration ───
    // Set your site URL and dashboard storage key
    let API = localStorage.getItem('sa_api') || '';
    let key = localStorage.getItem('sa_ak') || '';
    let s = null, last = null, ari = null;

    function render() {
      const a = document.getElementById('app');
      if (!API || !key) { a.innerHTML = authHTML(); return; }
      if (!s) { a.innerHTML = '<div class="loading">Loading...</div>'; return; }
      a.innerHTML = dashHTML();
    }

    function authHTML() {
      return `<div class="auth-screen"><div class="auth-box">
        <h1 style="margin-bottom:4px">Sovereign Analytics</h1>
        <div class="badge badge-green">Local dashboard &mdash; your data never leaves</div>
        <p class="muted" style="margin:1.5rem 0 1rem">Connect to your analytics API.</p>
        <div id="ae"></div>
        <input type="url" id="ui" placeholder="Site URL (e.g. https://example.com)" value="${esc(API)}" onkeydown="if(event.key==='Enter')document.getElementById('ki').focus()">
        <input type="password" id="ki" placeholder="Analytics key (ANALYTICS_KEY)" onkeydown="if(event.key==='Enter')auth()">
        <button class="btn btn-p" onclick="auth()" style="width:100%">Connect</button>
      </div></div>`;
    }

    function dashHTML() {
      const mx = Math.max(...s.viewsByDay.map(d=>d.count),1);
      const mxh = Math.max(...(s.viewsByHour||[]).map(h=>h.count),1);
      return `<div class="container">
        <div class="header">
          <div>
            <div style="display:flex;align-items:center;gap:12px">
              <h1>Sovereign Analytics</h1>
              ${s.liveCount > 0 ? `<div class="badge badge-live">${s.liveCount} live now</div>` : ''}
            </div>
            <div class="badge badge-green">First-party &middot; Self-hosted &middot; Your data</div>
          </div>
          <div class="actions">
            <button class="btn" onclick="exp('csv')">CSV</button>
            <button class="btn" onclick="exp('json')">JSON</button>
            <button class="btn btn-p" onclick="load()">Refresh</button>
            <button class="btn" onclick="logout()">Disconnect</button>
          </div>
        </div>
        <div class="stats-grid">
          ${sc('Views',s.totalViews)}${sc('Sessions',s.uniqueSessions)}${sc('Bounce',s.bounceRate+'%')}
          ${sc('Avg Time',ft(s.avgTimeOnPage))}${sc('Scroll',s.avgScrollDepth+'%')}${sc('Pages/Session',s.pagesPerSession)}
          ${sc('New Visitors',s.newVisitorRate+'%')}${sc('Pages',s.uniquePaths)}
        </div>
        ${s.viewsByDay.length?`<div class="card" style="margin-bottom:0.75rem">
          <h2>Traffic (30 days)</h2>
          <div class="chart">${s.viewsByDay.map(d=>`<div class="cb"><div class="tt">${d.date}: ${d.count}v / ${d.sessions}s</div><div class="bar" style="height:${(d.count/mx)*100}%"></div><div class="cl">${d.date.slice(8)}</div></div>`).join('')}</div>
        </div>`:''}
        ${(s.viewsByHour||[]).length?`<div class="card" style="margin-bottom:0.75rem">
          <h2>Traffic by Hour</h2>
          <div class="hchart">${Array.from({length:24},(_,i)=>{const h=s.viewsByHour.find(x=>x.hour===i);const c=h?h.count:0;return`<div class="hbar" style="height:${c?((c/mxh)*100)+'%':'1px'}" title="${i}:00 — ${c} views"></div>`}).join('')}</div>
          <div style="display:flex;justify-content:space-between;font-size:0.5rem;color:#475569;margin-top:2px"><span>12am</span><span>6am</span><span>12pm</span><span>6pm</span><span>11pm</span></div>
        </div>`:''}
        <div class="g3">
          ${tbl('Top Pages',s.topPages.map(p=>({l:p.path,v:p.views,sub:p.avgTime>0?ft(p.avgTime)+' · '+p.avgScroll+'% scroll':''})))}
          ${tbl('Entry Pages',(s.topEntryPages||[]).map(p=>({l:p.path,v:p.count})))}
          ${tbl('Exit Pages',(s.topExitPages||[]).map(p=>({l:p.path,v:p.count})))}
        </div>
        <div class="g3">
          ${tbl('Referrers',s.topReferrers.map(r=>({l:r.referrer,v:r.count})))}
          ${tbl('UTM Sources',s.topSources.map(u=>({l:u.source,v:u.count})))}
          ${tbl('Countries',(s.topCountries||[]).map(c=>({l:cc(c.country),v:c.count})))}
        </div>
        <div class="g4">
          ${bd('Devices',s.deviceBreakdown,s.totalViews)}
          ${bd('Browsers',s.browserBreakdown,s.totalViews)}
          ${bd('OS',s.osBreakdown,s.totalViews)}
          ${bd('Screens',(s.screenSizes||[]).map(x=>({device:x.size,count:x.count})),s.totalViews)}
        </div>
        ${(s.utmCampaigns||[]).length?`<div class="card" style="margin-bottom:0.75rem"><h2>UTM Campaigns</h2>${s.utmCampaigns.map(c=>`<div class="row"><span class="rl">${esc(c.campaign)} <span class="rs">via ${esc(c.source)}</span></span><span class="rv">${c.views}</span></div>`).join('')}</div>`:''}
        ${(s.customEvents||[]).length?`<div class="card" style="margin-bottom:0.75rem"><h2>Events</h2>${s.customEvents.map(ev=>`<div class="row"><span class="rl">${esc(ev.name)}</span><span class="rv">${ev.count}</span></div>`).join('')}</div>`:''}
        <div class="card">
          <h2>Recent Views</h2>
          ${s.recentViews.length===0?'<p class="muted">No views yet</p>':s.recentViews.map(v=>`<div class="rr">
            <span class="rt">${new Date(v.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</span>
            <span class="rp">${esc(v.path)}</span>
            <span class="rm">${esc(v.device)}·${esc(v.browser)}${v.country?' · '+cc(v.country):''}</span>
            ${v.referrer!=='(direct)'?`<span class="rm" style="margin-left:auto">via ${esc(v.referrer)}</span>`:''}
          </div>`).join('')}
        </div>
        <div class="status"><div class="dot"></div><span>Connected to ${esc(API)}</span><span>·</span><span>${last?last.toLocaleTimeString():'—'}</span><span>·</span><span>Auto-refresh: 60s</span></div>
      </div>`;
    }

    function sc(l,v){return`<div class="sc"><div class="sv">${v}</div><div class="sl">${l}</div></div>`}
    function tbl(t,rows){return`<div class="card"><h2>${t}</h2>${!rows.length?'<p class="muted">No data</p>':rows.map(r=>`<div class="row"><span class="rl">${esc(String(r.l))}${r.sub?`<span class="rs">${r.sub}</span>`:''}</span><span class="rv">${r.v}</span></div>`).join('')}</div>`}
    function bd(t,items,total){return`<div class="card"><h2>${t}</h2>${items.map(i=>{const l=i.device||i.browser||i.os||'?';const p=total>0?Math.round((i.count/total)*100):0;return`<div class="bdr"><div class="bdh"><span style="color:#cbd5e1">${esc(l)}</span><span style="color:#475569">${p}%</span></div><div class="bdt"><div class="bdf" style="width:${p}%"></div></div></div>`}).join('')}</div>`}
    function cc(code){const flags={'US':'\uD83C\uDDFA\uD83C\uDDF8','GB':'\uD83C\uDDEC\uD83C\uDDE7','CA':'\uD83C\uDDE8\uD83C\uDDE6','DE':'\uD83C\uDDE9\uD83C\uDDEA','FR':'\uD83C\uDDEB\uD83C\uDDF7','AU':'\uD83C\uDDE6\uD83C\uDDFA','IN':'\uD83C\uDDEE\uD83C\uDDF3','BR':'\uD83C\uDDE7\uD83C\uDDF7','JP':'\uD83C\uDDEF\uD83C\uDDF5','MX':'\uD83C\uDDF2\uD83C\uDDFD'};return(flags[code]||'\uD83C\uDF0D')+' '+code}
    function ft(sec){if(!sec)return'0s';if(sec<60)return sec+'s';return Math.floor(sec/60)+'m '+sec%60+'s'}
    function esc(str){const d=document.createElement('div');d.textContent=str||'';return d.innerHTML}

    async function auth(){
      const ui=document.getElementById('ui'),ki=document.getElementById('ki'),err=document.getElementById('ae');
      API=(ui?.value||'').trim().replace(/\/+$/,'');
      key=(ki?.value||'').trim();
      if(!API||!key)return;
      try{const r=await fetch(`${API}/api/analytics/stats`,{headers:{'Authorization':`Bearer ${key}`}});
      if(!r.ok){if(err)err.innerHTML='<div class="error">Invalid key or unreachable API</div>';key='';return}
      s=await r.json();last=new Date();localStorage.setItem('sa_ak',key);localStorage.setItem('sa_api',API);render();startAR()}
      catch(ex){if(err)err.innerHTML='<div class="error">Connection failed — check URL and CORS</div>';key=''}
    }
    async function load(){
      try{const r=await fetch(`${API}/api/analytics/stats`,{headers:{'Authorization':`Bearer ${key}`}});
      if(!r.ok){logout();return}s=await r.json();last=new Date();render()}catch{}}
    async function exp(f){
      try{const r=await fetch(`${API}/api/analytics/export?format=${f}&days=30`,{headers:{'Authorization':`Bearer ${key}`}});
      if(!r.ok)return;const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement('a');
      a.href=u;a.download=`analytics-30d.${f}`;a.click();URL.revokeObjectURL(u)}catch{}}
    function logout(){key='';s=null;API='';localStorage.removeItem('sa_ak');localStorage.removeItem('sa_api');if(ari)clearInterval(ari);render()}
    function startAR(){if(ari)clearInterval(ari);ari=setInterval(load,60000)}
    if(key&&API){render();load().then(()=>startAR())}else{render()}
  </script>
</body>
</html>
